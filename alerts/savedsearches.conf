[Detection 08 - Malicious Firewall Rule Creation via Netsh ]
# 1. METADATI
description = Rileva la modifica del Firewall con l'inserimento di una regola non permessa.
search = index=* (EventCode=4688 OR EventCode=1) "*netsh*" "*add rule*" "*allow*" | rex field=_raw "name=\"(?<nome_regola>[^\"]+)\"" | eval New_Account_Name=mvindex(Account_Name, 0) | table _time, host, EventCode, New_Account_Name, CommandLine, Image, nome_regola, Creator_Process_Name
 
# 2. SCHEDULAZIONE
enableSched = 1

# 3. CONDIZIONE DI INNESCO
cron_schedule = */15 * * * *
counttype = number of events
relation = greater than
quantity = 0

# 4. AZIONE
action.email = 1
action.email.to = soc@tuoazienda.com
action.email.subject = 🚨 CRITICAL: Modifica al Firewall rilevata sull'host $result.host$

