[Detection 01 - Encoded PowerShell Command]
# 1. METADATI
description = Rileva l'esecuzione di PowerShell con parametri di offuscamento e codifica in Base64 per nascondere payload maligni.
search = index=wineventlog EventCode=4688 New_Process_Name="*powershell.exe" (Process_Command_Line="* -enc*" OR Process_Command_Line="* -e *" OR Process_Command_Line="* -encoded*") | table _time, host, Account_Name, New_Process_Name, Process_Command_Line

# 2. SCHEDULAZIONE
enableSched = 1

# 3. CONDIZIONE DI INNESCO
cron_schedule = */15 * * * * 
counttype = number of events
relation = greater than
quantity = 0

# 4. AZIONE
action.email = 1
action.email.to = soc@tuoazienda.com
action.email.subject = 🚨 CRITICAL: PowerShell Offuscato rilevato sull'host $result.host$

[Detection 02 - Local User Creation]
# 1. METADATI
description = Rileva la creazione di Account/Utenti in locale possibilmente creati per ottenere persistenza da parte dell'attaccante.
search = index=wineventlog EventCode=4720 | eval Creator_Account=mvindex(Account_Name, 0) | table _time, host, Creator_Account, SAM_Account_Name

# 2. SCHEDULAZIONE
enableSched = 1

# 3. CONDIZIONE DI INNESCO
cron_schedule = */15 * * * *
counttype = number of events
relation = greater than
quantity = 0

# 4. AZIONE
action.email = 1
action.email.to = soc@tuoazienda.com
action.email.subject = 🚨 CRITICAL: Account Locale rilevato sull'host $result.host$

[Detection 03 - Local Privilege Escalation]
# 1. METADATI
description = Rileva l'aggiunta di Privilegi di amministratore ad un account locale creato per ottenere persistenza.
search = index=wineventlog EventCode=4732 Group_Name=Administrators | eval Creator_Account=mvindex(Account_Name, 0) | eval Added_Account_SID=mvindex(Security_ID, 1) | table _time, host, Creator_Account, Group_Name, Added_Account_SID

# 2. SCHEDULAZIONE
enableSched = 1

# 3. CONDIZIONE DI INNESCO
cron_schedule = */15 * * * *
counttype = number of events
relation = greater than
quantity = 0

# 4. AZIONE
action.email = 1
action.email.to = soc@tuoazienda.com
action.email.subject = 🚨 CRITICAL: Privilege Escalation rilevata sull'host $result.host$ nell'account $result.Added_Account_SID$

[Detection 04 - Windows Defender Evasion ]
# 1. METADATI
description = Rileva la disattivazione della protezione in tempo reale di Windows.
search = index=wineventlog source="*PowerShell*" (EventCode=4103 OR EventCode=4104) "Set-MpPreference" "DisableRealtimeMonitoring" | table _time, host, EventCode, Message

# 2. SCHEDULAZIONE
enableSched = 1

# 3. CONDIZIONE DI INNESCO
cron_schedule = */15 * * * *
counttype = number of events
relation = greater than
quantity = 0

# 4. AZIONE
action.email = 1
action.email.to = soc@tuoazienda.com
action.email.subject = 🚨 CRITICAL: Windows Defender disattivato rilevato sull'host $result.host$

[Detection 05 - Scheduled Task Creation for Persistence ]
# 1. METADATI
description = Rileva la creazione di attività schedulate al riavvio per persistenza da parte dell'attaccante.
search = index=wineventlog EventCode=4698 | rex field=_raw "<Command>(?<Task_Command>[^<]+)</Command>" | table _time, host, Account_Name, Task_Name, Task_Command

# 2. SCHEDULAZIONE
enableSched = 1

# 3. CONDIZIONE DI INNESCO
cron_schedule = */15 * * * *
counttype = number of events
relation = greater than
quantity = 0

# 4. AZIONE
action.email = 1
action.email.to = soc@tuoazienda.com
action.email.subject = 🚨 CRITICAL: Task Schedulata creata rilevata sull'host $result.host$

